name: Weekly prediction publish

# 15:00 UTC every Friday -- after nightly.yml's typical 13:30-16:00 UTC
# window for that same day. Shares nightly's concurrency group (below), so
# if nightly is still running this queues behind it rather than racing its
# data/ commit, regardless of the exact timing.
on:
  schedule:
    - cron: "0 15 * * 5"
  workflow_dispatch: {}

# Freezes this week's official Top-10 into published_predictions +
# predictions/YYYY-MM-DD.{csv,json} (see reporting/publish.py). Rebuilds
# technical features + retrains from committed silver/gold data rather than
# reading nightly's in-memory state -- data/gold/features is deliberately
# git-ignored (see .gitignore) and only exists on the runner that just
# computed it, so a separate scheduled job on a fresh checkout can't assume
# it's there. The determinism fix (common/trading_calendar.py) makes this
# recompute reproduce nightly's own ranking for the same date, not risk
# diverging from it.
permissions:
  contents: write

concurrency:
  group: nightly-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Rebuilds technical features (no re-ingestion, no FinBERT) and retrains
    # one production model for one horizon -- much cheaper than nightly's
    # full ~2.5h run, but generous headroom regardless.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      # No [sentiment] extra -- same reasoning as monthly_backtest.yml: this
      # only rebuilds technical features + scores, never touches FinBERT.
      - name: Install dependencies
        run: pip install -e .

      - name: Publish this week's Top-10
        run: python scripts/publish_weekly_predictions.py

      - name: Commit and push published predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/app.db predictions/
          git diff --staged --quiet && echo "No new predictions to commit" && exit 0
          git commit -m "Weekly prediction publish $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"

          # Same merge-not-rebase, keep-ours-on-conflict policy as
          # nightly.yml -- see that file's comment for why.
          git fetch origin main
          if ! git merge origin/main --no-edit -m "Merge origin/main into weekly publish commit"; then
            git diff --name-only --diff-filter=U | while IFS= read -r f; do
              if git cat-file -e "HEAD:$f" 2>/dev/null; then
                git checkout --ours -- "$f"
                git add "$f"
              else
                git rm -f -q "$f"
              fi
            done
            git commit --no-edit
          fi
          git push origin main
