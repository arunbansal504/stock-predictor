name: Nightly pipeline

# 13:30 UTC = 19:00 IST, after NSE close (15:30 IST). Weekends/holidays are
# harmless no-ops -- the pipeline tolerates stale gaps (see README's
# "Honesty notes") -- not worth the added complexity of excluding them.
on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch: {}

# GitHub Actions runners are ephemeral -- there is no other persistent disk
# between runs. This workflow's data/ commit-back step IS the persistence
# layer (see .gitignore and README's "Scheduling" section): without it, the
# accumulated news/sentiment history would be destroyed every single run
# (Google News RSS has no historical archive to re-fetch from -- see
# features/sentiment.py), and prices/fundamentals would need a full 5-year
# re-fetch every night instead of a cheap incremental one.
permissions:
  contents: write

# A run has historically taken ~2.5 hours (dominated by per-symbol FinBERT
# scoring across the ~500-symbol universe); guard against a second
# scheduled trigger firing into an already-running job rather than queuing
# a redundant, conflicting one.
concurrency:
  group: nightly-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      # FinBERT itself doesn't change; caching it avoids re-downloading
      # ~400MB from Hugging Face every single night.
      - name: Cache FinBERT model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: finbert-prosusai-v1

      - name: Install dependencies
        run: pip install -e ".[sentiment]"

      - name: Run nightly pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m stockpredictor.orchestration.nightly_flow

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No data changes to commit" && exit 0
          git commit -m "Nightly data update $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"

          # A plain `git pull --rebase` fails hard on a modify/delete
          # conflict (observed live: a run whose checkout predated a
          # data-tracking change -- e.g. excluding gold/features -- still
          # has that path tracked locally, so its own fresh recompute
          # "modifies" a file main has since deleted, and rebase can't
          # reconcile that automatically). `-X ours`/`-X theirs` do NOT
          # help here either -- verified locally -- those strategy options
          # only resolve line-level text conflicts, not file add/delete
          # conflicts. So: merge instead of rebase, and if it conflicts,
          # resolve every conflicted path by keeping whichever side THIS
          # run's own commit has (present -> keep our content; absent ->
          # keep it deleted). This run just spent up to ~2.5 hours
          # recomputing the full universe -- its data/ state is always the
          # authoritative "latest," so this is a correct policy for this
          # single-writer, fully-regenerated-each-run dataset, not just an
          # expedient one.
          git fetch origin main
          if ! git merge origin/main --no-edit -m "Merge origin/main into nightly data commit"; then
            git diff --name-only --diff-filter=U | while IFS= read -r f; do
              if git cat-file -e "HEAD:$f" 2>/dev/null; then
                git checkout --ours -- "$f"
                git add "$f"
              else
                git rm -f -q "$f"
              fi
            done
            git commit --no-edit
          fi
          git push origin main
